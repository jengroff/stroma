repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix, src/stroma/, tests/]
        pass_filenames: false
      - id: ruff-format

  - repo: local
    hooks:
      - id: ty
        name: ty type check
        entry: uv run ty check src/stroma/
        language: system
        types: [python]
        pass_filenames: false
