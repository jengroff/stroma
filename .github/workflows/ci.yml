name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Lint with ruff
        run: uv run ruff check src/stroma/ tests/
      - name: Type check with ty
        run: uv run ty check src/stroma/
      - name: Run tests with coverage
        run: uv run pytest tests/ -v --cov=stroma --cov-report=term-missing --cov-fail-under=90
